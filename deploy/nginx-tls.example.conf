upstream django_app {
    server 127.0.0.1:8000;
    keepalive 16;
}

server {
    listen 80 default_server;
    server_name atilahatefi.ir www.atilahatefi.ir;
    return 301 https://atilahatefi.ir$request_uri;
}

server {
    listen 80;
    server_name _;
    return 444;
}

server {
    listen 443 ssl http2;
    server_name www.atilahatefi.ir;

    ssl_certificate /etc/letsencrypt/live/atilahatefi.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/atilahatefi.ir/privkey.pem;

    return 301 https://atilahatefi.ir$request_uri;
}

server {
    listen 443 ssl http2;
    server_name atilahatefi.ir;

    root /srv/portfolio/current/frontend/dist;
    index index.html;
    autoindex off;
    server_tokens off;
    client_max_body_size 12m;
    client_body_timeout 30s;
    send_timeout 60s;

    ssl_certificate /etc/letsencrypt/live/atilahatefi.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/atilahatefi.ir/privkey.pem;

    location ~ /\.(?!well-known) {
        deny all;
    }

    location ~* \.(?:env|ini|sqlite3|db|dump|sql|pem|key|p12|pfx|crt|csr|der|py|pyc|map)$ {
        deny all;
    }

    location = /nginx-health/ {
        access_log off;
        return 204;
    }

    location = /health/ {
        proxy_pass http://django_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    location /api/ {
        proxy_pass http://django_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    location /go-to-settings/ {
        proxy_pass http://django_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    location /static/ {
        alias /srv/portfolio/current/backend/staticfiles/;
        try_files $uri =404;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy same-origin always;
        expires 1y;
        access_log off;
    }

    location /media/ {
        alias /srv/portfolio/shared/media/;
        try_files $uri =404;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy same-origin always;
        expires 1h;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy same-origin always;
    }
}
