name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - security/hardening

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: portfolio
          POSTGRES_USER: portfolio
          POSTGRES_PASSWORD: portfolio_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U portfolio -d portfolio"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Django local checks and tests
        working-directory: backend
        run: |
          python manage.py check
          python manage.py test
          python manage.py makemigrations --check --dry-run
          python -m pip check

      - name: Django production deploy check
        working-directory: backend
        env:
          DJANGO_DEBUG: "False"
          DJANGO_SECRET_KEY: ci-placeholder-secret-key-not-for-production
          DJANGO_ALLOWED_HOSTS: atilahatefi.ir,www.atilahatefi.ir
          DJANGO_CSRF_TRUSTED_ORIGINS: https://atilahatefi.ir,https://www.atilahatefi.ir
          DJANGO_CORS_ALLOWED_ORIGINS: https://atilahatefi.ir,https://www.atilahatefi.ir
          DJANGO_SECURE_SSL_REDIRECT: "True"
          DJANGO_USE_X_FORWARDED_PROTO: "True"
          DJANGO_HSTS_SECONDS: "0"
          DJANGO_USE_MANIFEST_STATICFILES: "True"
          DATABASE_URL: postgresql://portfolio:portfolio_ci_password@127.0.0.1:5432/portfolio
        run: python manage.py check --deploy

      - name: Frontend install, test, build, and audit
        working-directory: frontend
        run: |
          npm ci
          npm run test --if-present
          npm run build
          npm audit --audit-level=high
